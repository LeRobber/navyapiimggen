<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Image Generation Tool</title>

  <style>

    body {
      font-family: Arial, sans-serif;
      width: 100%;
      max-width: 430px;
      margin: 20px auto;
      padding: 16px;
      background: #111;
      color: #eee;
      min-height: 100vh;
      box-sizing: border-box;
    }

    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      font-size: 14px;
    }

    textarea,
    input,
    select {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #444;
      background: #1e1e1e;
      color: white;
      box-sizing: border-box;
      font-size: 14px;
    }

    textarea {
      min-height: 200px;
      resize: vertical;
      margin-bottom: 20px;
    }

    select {
      margin-bottom: 20px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      background: #4f46e5;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    button:hover {
      background: #6366f1;
    }

    .upload-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 14px;
    }

    .upload-row input[type="file"] {
      flex: 1;
      padding: 8px;
    }

    .preview {
      width: 70px;
      height: 70px;
      border-radius: 10px;
      overflow: hidden;
      background: #222;
      border: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .preview img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .placeholder {
      font-size: 11px;
      color: #777;
      text-align: center;
      padding: 5px;
    }

    .job-box {
      margin-top: 20px;
      padding: 14px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      font-size: 13px;
      line-height: 1.6;
    }

    .generated-images {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .image-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px;
    }

    .image-card img {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #333;
      margin-top: 10px;
    }

    .download-btn {
      margin-top: 10px;
      background: #16a34a;
    }

    .download-btn:hover {
      background: #22c55e;
    }

    pre {
      background: #1e1e1e;
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
      margin-top: 20px;
      white-space: pre-wrap;
      font-size: 12px;
    }

  </style>
</head>

<body>

<h1>Image Generation Tool</h1>

<label>API Key</label>

<input
  type="password"
  id="loginPassword"
  autocomplete="current-password"
  placeholder="Enter API Key"
/>

<label>Model</label>

<select id="model">
  <option value="gpt-image-2">gpt-image-2</option>
  <option value="p-image">p-image</option>
  <option value="imagen-4">imagen-4</option>
  <option value="nano-banana-pro">nano-banana-pro</option>
  <option value="nano-banana-2">nano-banana-2</option>
  <option value="z-image">z-image</option>
  <option value="flux">flux</option>
</select>

<label for="image-ratios">Select Image Size:</label>
<select name="image-ratios" id="image-ratios">


  
    <!-- Traditional, Square & Mobile -->
    <optgroup label="Traditional, Square & Mobile">
        <option value="2048x1536">4:3 - iPad / Digital Camera (2048x1536)</option>
        <option value="1440x1080">4:3 - Digital Camera (1440x1080)</option>
        <option value="1024x768">4:3 - Older TV / XGA (1024x768)</option>
        <option value="1080x1350">4:5 - Instagram Portrait Post (1080x1350)</option>
        <option value="2048x2048">1:1 - Square / Profile Pic (2048x2048)</option>
        <option value="1024x1024">1:1 - Square / Profile Pic (1024x1024)</option>
        <option value="1080x1920">9:16 - TikTok / Reels / Shorts (1080x1920)</option>
        <option value="720x1280">9:16 - TikTok / Reels / Shorts (720x1280)</option>
    </optgroup>

       <!-- Widescreen & Digital Standards -->
    <optgroup label="Widescreen & Digital Standards">
        <option value="3840x2160">16:9 - 4K UHD (3840x2160)</option>
        <option value="2560x1440">16:9 - 1440p QHD (2560x1440)</option>
        <option value="1920x1080">16:9 - 1080p FHD (1920x1080)</option>
        <option value="1280x720">16:9 - 720p HD (1280x720)</option>
        <option value="2560x1600">16:10 - Productivity Laptop (2560x1600)</option>
        <option value="1920x1200">16:10 - Productivity Laptop (1920x1200)</option>
        <option value="3000x2000">3:2 - DSLR / 35mm Photo (3000x2000)</option>
        <option value="1500x1000">3:2 - DSLR / 35mm Photo (1500x1000)</option>
        <option value="1080x720">3:2 - DSLR / 35mm Photo (1080x720)</option>
    </optgroup>

    <!-- Ultra-Wide & Panoramic -->
    <optgroup label="Ultra-Wide & Panoramic (3:1 to 2:1)">
        <option value="3072x1024">3:1 - Cinematic Banner (3072x1024)</option>
        <option value="2048x683">3:1 - Cinematic Crop (2048x683)</option>
        <option value="2390x1000">2.39:1 - Anamorphic Cinema Standard (2390x1000)</option>
        <option value="2560x1071">2.39:1 - Anamorphic Cinema Standard (2560x1071)</option>
        <option value="3440x1440">21:9 - Ultrawide QHD (3440x1440)</option>
        <option value="2560x1080">21:9 - Ultrawide FHD (2560x1080)</option>
        <option value="2000x1000">2:1 - Social Media Carousel / Wide Banner (2000x1000)</option>
        <option value="4000x2000">2:1 - Social Media Carousel / Wide Banner (4000x2000)</option>
        <option value="1920x1037">1.85:1 - US Cinema Widescreen (1920x1037)</option>
        <option value="1850x1000">1.85:1 - US Cinema Widescreen (1850x1000)</option>
    </optgroup>

    <!-- Expanded Portrait & Landscape -->
    <optgroup label="Expanded Portrait & Landscape">
        <option value="960x2160">4:9 - Ultra-Tall Portrait (960x2160)</option>
        <option value="720x1280">4:7 - Tall Portrait (720x1280)</option>
        <option value="1440x720">7:4 - Wide Landscape (1440x720)</option>
        <option value="2160x960">9:4 - Ultra-Wide Landscape (2160x960)</option>
    </optgroup>

        <!-- Facebook & Social Media Headers -->
    <optgroup label="Facebook & Social Media Headers">
        <option value="851x315">FB Cover Photo (851x315)</option>
        <option value="1640x856">FB Group Header (1640x856)</option>
        <option value="1920x1005">FB Event Cover (1920x1005)</option>
    </optgroup>


 
</select>


<label>Prompt</label>

<textarea
  id="prompt"
  placeholder="Describe the image you want generated..."
></textarea>

<label>Upload Reference Images (max 5)</label>

<div id="uploadList">

  <div class="upload-row">
    <input type="file" accept="image/*">
    <div class="preview">
      <div class="placeholder">Preview</div>
    </div>
  </div>

  <div class="upload-row">
    <input type="file" accept="image/*">
    <div class="preview">
      <div class="placeholder">Preview</div>
    </div>
  </div>

  <div class="upload-row">
    <input type="file" accept="image/*">
    <div class="preview">
      <div class="placeholder">Preview</div>
    </div>
  </div>

  <div class="upload-row">
    <input type="file" accept="image/*">
    <div class="preview">
      <div class="placeholder">Preview</div>
    </div>
  </div>

  <div class="upload-row">
    <input type="file" accept="image/*">
    <div class="preview">
      <div class="placeholder">Preview</div>
    </div>
  </div>

</div>

<button id="generateBtn">
  Generate
</button>

<div class="job-box">
  <strong>Job ID:</strong>
  <span id="jobId">None</span>

  <br><br>

  <strong>Status:</strong>
  <span id="jobStatus">Idle</span>
</div>

<div
  class="generated-images"
  id="generatedImages"
></div>

<pre id="output"></pre>

<pre id="trace"></pre>

<script>

function getSelectedSize() {
    // Target the dropdown by its ID
    const dropdown = document.getElementById('image-ratios');
    
    // Grab the value (e.g., "1920x1080")
    const selectedValue = dropdown.value;
    
    console.log("Selected Size:", selectedValue);
    return selectedValue;
}

// Example usage: linking it to a button in your HTML
// <button onclick="getSelectedSize()">Submit</button>


let pollInterval = null;

/* ---------------------------
   FILE INPUT PREVIEWS
----------------------------*/

document
  .querySelectorAll(".upload-row")
  .forEach((row) => {

    const input =
      row.querySelector("input");

    const preview =
      row.querySelector(".preview");

    input.addEventListener(
      "change",
      () => {

        const file =
          input.files[0];

        if (!file) {

          preview.innerHTML =
            '<div class="placeholder">Preview</div>';

          return;
        }

        const reader =
          new FileReader();

        reader.onload = (e) => {

          preview.innerHTML = "";

          const img =
            document.createElement("img");

          img.src =
            e.target.result;

          preview.appendChild(img);
        };

        reader.readAsDataURL(file);
      }
    );
  });

/* ---------------------------
   SAVE CREDENTIAL
----------------------------*/

async function saveApiKeyCredential() {

  try {

    if (
      !window.PasswordCredential ||
      !navigator.credentials
    ) {
      return;
    }

    const password =
      document
        .getElementById("loginPassword")
        .value
        .trim();

    if (!password) {
      return;
    }

    const cred =
      new PasswordCredential({
        id: "api-key",
        password,
        name: "API Key"
      });

    await navigator
      .credentials
      .store(cred);

  } catch (e) {

    console.log(
      "Credential save skipped"
    );
  }
}

/* ---------------------------
   FILE -> DATA URI
----------------------------*/

function fileToDataURI(file) {

  return new Promise((resolve, reject) => {

    const reader =
      new FileReader();

    reader.onload = () => {
      resolve(reader.result);
    };

    reader.onerror = reject;

    reader.readAsDataURL(file);
  });
}

/* ---------------------------
   GENERATE
----------------------------*/

async function generateImage() {

  const prompt =
    document
      .getElementById("prompt")
      .value
      .trim();

  const apiKey =
    document
      .getElementById("loginPassword")
      .value
      .trim();

  const model =
    document
      .getElementById("model")
      .value;

  if (!prompt || !apiKey) {

    alert(
      "Missing prompt or API key"
    );

    return;
  }

  await saveApiKeyCredential();

  const fileInputs =
    document.querySelectorAll(
      "#uploadList input[type='file']"
    );

  const images = [];

  for (const input of fileInputs) {

    const file =
      input.files[0];

    if (file) {

      const dataURI =
        await fileToDataURI(file);

      images.push(
         dataURI
      );
    }
  }

  const payload = {

    model,
    prompt,

    size: getSelectedSize(),

    sync: false,

    image_url: images
  };

  document
    .getElementById("output")
    .textContent =
      "Sending request...";

  try {
    const stringifiedPayload = JSON.stringify(payload);
    const response =
      await fetch(
        "https://api.navy/v1/images/generations",
        {
          method: "POST",

          headers: {

            "Authorization":
              `Bearer ${apiKey}`,

            "Content-Type":
              "application/json"
          },

          body: stringifiedPayload
            
        }
      );

    const data =
      await response.json();

    document
      .getElementById("output")
      .textContent =
        JSON.stringify(data, null, 2);

    const jobId =
      data.id;

    if (!jobId) {

      alert(
        "No job ID returned"
      );

      document
      .getElementById("trace")
      .textContent = stringifiedPayload;

      return;
    }

    document
      .getElementById("jobId")
      .textContent =
        jobId;

    startPolling(
      jobId,
      apiKey
    );

  } catch (err) {

    console.error(err);

    document
      .getElementById("output")
      .textContent =
        err.toString();
  }
}

/* ---------------------------
   POLLING
----------------------------*/

function startPolling(
  jobId,
  apiKey
) {

  if (pollInterval) {

    clearInterval(
      pollInterval
    );
  }

  checkJob(
    jobId,
    apiKey
  );

  pollInterval =
    setInterval(() => {

      checkJob(
        jobId,
        apiKey
      );

    }, 5000);
}

/* ---------------------------
   CHECK JOB
----------------------------*/

async function checkJob(
  jobId,
  apiKey
) {

  try {

    const response =
      await fetch(
        `https://api.navy/v1/images/generations/${jobId}`,
        {
          headers: {

            "Authorization":
              `Bearer ${apiKey}`
          }
        }
      );

    const data =
      await response.json();

    document
      .getElementById("output")
      .textContent =
        JSON.stringify(data, null, 2);

    document
      .getElementById("jobStatus")
      .textContent =
        data.status;

    if (
      data.status !== "completed"
    ) {
      return;
    }

    clearInterval(
      pollInterval
    );

    const container =
      document.getElementById(
        "generatedImages"
      );

    container.innerHTML = "";

    const items =
      data?.result?.data || [];

    items.forEach(
      (item, index) => {

        const card =
          document.createElement(
            "div"
          );

        card.className =
          "image-card";

        const title =
          document.createElement(
            "div"
          );

        title.textContent =
          `Generated Image ${index + 1}`;

        title.style.fontWeight =
          "bold";

        card.appendChild(title);

        let imageSrc = null;

        // BASE64

        if (item.b64_json) {

          imageSrc =
            `data:image/png;base64,${item.b64_json}`;
        }

        // URL

        else if (item.url) {

          imageSrc =
            item.url;
        }

        if (imageSrc) {

          const img =
            document.createElement(
              "img"
            );

          img.src =
            imageSrc;

          card.appendChild(img);

          const downloadBtn =
            document.createElement(
              "button"
            );

          downloadBtn.className =
            "download-btn";

          downloadBtn.textContent =
            "Download";

          downloadBtn.onclick =
            () => {

              const a =
                document.createElement(
                  "a"
                );

              a.href =
                imageSrc;

              a.download =
                `generated-image-${index + 1}.png`;

              a.click();
            };

          card.appendChild(
            downloadBtn
          );
        }

        container.appendChild(
          card
        );
      }
    );

  } catch (err) {

    console.error(err);

    document
      .getElementById("jobStatus")
      .textContent =
        "poll error";
  }
}

/* ---------------------------
   BUTTON
----------------------------*/

document
  .getElementById(
    "generateBtn"
  )
  .addEventListener(
    "click",
    generateImage
  );

</script>

</body>
</html>
